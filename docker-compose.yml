
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: quantro
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: quantro_db
    ports:
      - "5432:5432"
    volumes:
      - quantro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - quantro_redisdata:/data
    command: redis-server --appendonly yes

  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./services:/app/services

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  quantro_pgdata:
  quantro_redisdata:
