<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace;z-index:9999;position:absolute;background:white;width:100%;height:100%;">' + 
          '<h3>Runtime Error:</h3><pre>' + e.message + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace;z-index:9999;position:absolute;background:white;width:100%;height:100%;">' + 
          '<h3>Unhandled Promise Rejection:</h3><pre>' + e.reason + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
